<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
  <div class="login-wrapper">
    <div class="card login-card shadow-lg">
      <h3 class="text-center mb-3">Register Student</h3>
      <input id="name" class="form-control mb-2" placeholder="Name">
      <input id="roll" class="form-control mb-2" placeholder="Roll No">
      <select id="stream" class="form-select mb-2">
        <option value="TYIT">TYIT</option>
        <option value="TYBCom">TYBCom</option>
        <option value="TYBA">TYBA</option>
        <option value="TYBMS">TYBMS</option>
      </select>
      <input id="password" type="password" class="form-control mb-2" placeholder="Password">
      <button onclick="captureFace()" class="btn btn-primary w-100 mb-2">Capture Face</button>
      <video id="video" autoplay style="width:100%;"></video>
      <button onclick="register()" class="btn btn-success w-100">Register</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
