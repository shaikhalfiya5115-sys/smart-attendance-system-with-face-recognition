 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.misdeliver.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="sidebar">
  <h5 class="text-center">📸 Smart Attendance</h5>
  <hr>
  <a href="admin.html">🏠 Dashboard</a>
  <a href="attendance.html">📝 Attendance</a>
  <a href="analytics.html" class="admin-only">📊 Analytics</a>
  <a href="defaulter.html" class="admin-only">⚠ Defaulters</a>
  <a href="#" onclick="toggleTheme()">🌙 Dark / ☀ Light</a>
  <a href="login.html" class="text-danger">🚪 Logout</a>
  <a href="admin.html" class="admin-only">⚙ Admin</a>
<a href="student.html" class="admin-only">👨‍🎓 Students</a>

</div>

<div class="content">
  <nav>🛠 Admin Dashboard</nav>

  <div class="container mt-4">
    <div class="card shadow-sm text-center mb-4">
      <div class="card-body">
        <h5>📈 Attendance</h5>
        <h1 id="percent" class="badge bg-success p-3 fs-4">0%</h1>
        <p class="text-muted mt-2">Overall Attendance</p>
      </div>
    </div>

    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>Roll</th>
          <th>Name</th>
          <th>Subject</th>
          <th>Date</th>
          <th>Time</th>
          <th>Status</th>
        </tr>
      </thead>
     <tbody id="attendanceTable"></tbody>

    </table>
  </div>
</div>

  <div class="action-buttons">

     <button class="btn export-btn">
    ⬇ Export Students List
  </button>

  <button class="btn backup-btn" onclick="backupData()">
    💾 Backup Data
  </button>

  <label class="btn restore-btn">
    ♻ Restore Data
    <input type="file" hidden accept=".json" onchange="restoreData(event)">
  </label>

  <button class="btn reset-btn" onclick="resetData()">
    🗑 Reset Data
  </button>

</div>


<script src="script.js"></script>
</body>
</html>
