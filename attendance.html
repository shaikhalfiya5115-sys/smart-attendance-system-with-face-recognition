<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mark Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar">
  <h5 class="text-center">📸 Smart Attendance</h5>
  <hr>
  <a href="admin.html">🏠 Dashboard</a>
  <a href="attendance.html">📝 Attendance</a>
  <a href="login.html" class="text-danger">🚪 Logout</a>
</div>
<div class="content">
  <div class="container mt-4">
    <h4>📝 Mark Attendance (Two-Step)</h4>
    <div class="progress mb-3"><div class="progress-bar" id="progress" style="width:0%"></div></div>
    <div class="row">
      <div class="col-md-6">
        <h5>Step 1: Manual Details</h5>
        <input id="stuName" class="form-control mb-2" placeholder="Name">
        <input id="stuRoll" class="form-control mb-2" placeholder="Roll No">
        <select id="stuStream" class="form-select mb-2">
          <option value="TYIT">TYIT</option>
          <option value="TYBCom">TYBCom</option>
          <option value="TYBA">TYBA</option>
          <option value="TYBMS">TYBMS</option>
        </select>
        <input id="stuSubject" class="form-control mb-2" placeholder="Subject">
        <button onclick="manualStep()" class="btn btn-primary">Verify Manual</button>
      </div>
      <div class="col-md-6">
        <h5>Step 2: Face Verification</h5>
        <video id="video" autoplay class="mb-2" style="width:100%;"></video>
        <button onclick="faceStep()" class="btn btn-success">Verify Face</button>
        <p id="msg" class="mt-2"></p>
      </div>
    </div>
  </div>
</div>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script src="script.js"></script>
</body>
</html>
